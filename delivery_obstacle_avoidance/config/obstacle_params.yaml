ultrasonic_scan_node:
  ros__parameters:
    gpio_chip: 4
    trigger_pin: 17
    echo_left_pin: 27
    echo_right_pin: 22
    echo_front_pin: 23
    echo_back_pin: 24
    front_servo_pin: 13
    back_servo_pin: 18
    servo_center_us: 1500
    servo_plus_45_us: 1750
    servo_minus_45_us: 1250
    scan_period_s: 0.08
    servo_settle_s: 0.30
    servo_step_us: 10
    enable_servo_output: false
    enable_servo_scan: false
    print_readings: true
    print_period_s: 0.50
    echo_timeout_s: 0.04
    filter_window: 5
    reading_expiry_s: 0.50

obstacle_decision_node:
  ros__parameters:
    dead_zone_cm: 3.0
    emergency_stop_cm: 20.0
    front_blocked_cm: 22.0
    front_clear_cm: 40.0
    back_blocked_cm: 22.0
    back_clear_cm: 40.0
    side_blocked_cm: 22.0
    side_motion_clear_cm: 40.0
    avoidance_side_limit_cm: 22.0
    static_wait_s: 10.0
    enable_static_avoidance: true
    front_clear_confirm_s: 0.40
    edge_near_max_cm: 45.0
    edge_far_min_cm: 60.0
    edge_jump_min_cm: 25.0
    edge_confirm_samples: 2
    safety_release_confirm_s: 0.50
    sensor_stale_timeout_s: 0.35
    esp_transition_fresh_s: 0.75
    esp_stale_timeout_s: 2.00
    startup_sensor_grace_s: 1.00
    stop_repeat_s: 1.00
    motion_command_epsilon: 0.02
    rotation_command_epsilon: 0.10
    wheel_target_epsilon: 0.05
    lateral_body_margin_m: 0.34
    forward_body_margin_m: 0.38
    side_avoidance_longitudinal_margin_m: 0.38
    side_avoidance_lateral_margin_m: 0.34
    maximum_lateral_search_m: 0.90
    maximum_forward_search_m: 1.20
    pass_obstacle_seen_cm: 45.0
    pass_obstacle_clear_cm: 60.0
    avoidance_stage_timeout_s: 15.0
    avoidance_stall_timeout_s: 3.0
    avoidance_progress_m: 0.02
    avoidance_pause_timeout_s: 0.0
    avoidance_measurement_mode: false
    avoidance_command_retry_s: 0.50
    pose_tolerance_m: 0.06
    yaw_tolerance_deg: 6.0
    decision_period_s: 0.10
    resume_saved_target: true

esp_http_bridge_node:
  ros__parameters:
    esp_base_url: "http://192.168.1.112"
    poll_period_s: 0.25
    poll_timeout_s: 0.30
    command_timeout_s: 0.75
    stop_heartbeat_s: 1.00
